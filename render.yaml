services:
  - type: web
    name: aihcas
    runtime: node
    plan: free
    buildCommand: |
      npm install && pip3 install -t ./python_lib -r requirements.txt && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract
      - key: PYTHONPATH
        value: ./python_lib
